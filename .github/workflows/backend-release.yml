name: Backend Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - staging
    paths:
      - "harvestlink_backend_login_test/**"
      - ".github/workflows/backend-release.yml"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harvestlink_backend_login_test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: harvestlink_backend_login_test/package-lock.json

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Install Release Dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
